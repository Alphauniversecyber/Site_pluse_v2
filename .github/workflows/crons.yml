          echo

      - name: Drain queued slow jobs
        if: ${{ github.event.schedule == '0 10 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-report-pdfs')) }}
        run: |
