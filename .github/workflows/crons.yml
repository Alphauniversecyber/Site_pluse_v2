            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/sync-uptimerobot"
          echo

      - name: Trigger process-competitors
        if: ${{ github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-competitors')) }}
        run: |
