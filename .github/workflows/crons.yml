name: SitePulse Crons

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Cron job to run manually"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - process-paddle-webhooks
          - process-scans
          - process-uptime
          - sync-uptimerobot
          - process-competitors
          - process-report-pdfs
          - process-report-emails
          - expire-trials
          - process-lifecycle-emails

concurrency:
  group: sitepulse-crons
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger-crons:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Validate scheduler secrets
        run: |
          set -euo pipefail
          test -n "$SITE_URL"
          test -n "$CRON_SECRET"

      - name: Trigger process-paddle-webhooks
        if: ${{ github.event.schedule == '0 5 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-paddle-webhooks')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/process-paddle-webhooks"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/process-paddle-webhooks"
          echo

      - name: Trigger process-scans
        if: ${{ github.event.schedule == '0 6 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-scans')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/process-scans"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/process-scans"
          echo

      - name: Drain queued slow jobs
        if: ${{ github.event.schedule == '0 6 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-scans')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"

          for iteration in $(seq 1 120); do
            echo "Processing worker queue batch ${iteration}"
            response_file="$(mktemp)"
            http_status="$(curl --show-error --silent \
              --location \
              --location-trusted \
              --request GET \
              --header "Accept: application/json" \
              --header "Authorization: Bearer ${CRON_SECRET}" \
              --output "$response_file" \
              --write-out "%{http_code}" \
              "${base_url}/api/worker/process-queue?job=process-scans" || true)"

            if [ "$http_status" = "504" ]; then
              echo "Worker queue returned 504 Gateway Timeout; treating as soft error and retrying in 5 seconds." >&2
              cat "$response_file"
              echo
              rm -f "$response_file"
              sleep 5
              continue
            fi

            if [ "${http_status:-000}" -ge 400 ]; then
              echo "Worker queue request failed with HTTP ${http_status}." >&2
              cat "$response_file" >&2
              rm -f "$response_file"
              exit 1
            fi

            response="$(cat "$response_file")"
            rm -f "$response_file"
            echo "$response"

            done_flag="$(printf '%s' "$response" | node -e "const fs = require('fs'); const payload = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(String(Boolean(payload?.done)));" )"
            remaining="$(printf '%s' "$response" | node -e "const fs = require('fs'); const payload = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(String(Number(payload?.remaining ?? NaN)));" )"

            if [ "$done_flag" = "true" ] || [ "$remaining" = "0" ]; then
              exit 0
            fi

            sleep 2
          done

          echo "Scan worker queue still has pending jobs after 120 batches." >&2
          exit 1

      - name: Trigger process-uptime
        if: ${{ github.event.schedule == '0 7 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-uptime')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/process-uptime"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/process-uptime"
          echo

      - name: Drain queued slow jobs
        if: ${{ github.event.schedule == '0 7 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-uptime')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"

          for iteration in $(seq 1 60); do
            echo "Processing worker queue batch ${iteration}"
            response="$(curl --fail --show-error --silent \
