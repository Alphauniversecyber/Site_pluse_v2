name: SitePulse Crons

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Cron job to run manually"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - process-paddle-webhooks
          - process-scans
          - process-uptime
          - sync-uptimerobot
          - process-competitors
          - process-reports
          - expire-trials
          - process-lifecycle-emails

concurrency:
  group: sitepulse-crons
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger-crons:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Validate scheduler secrets
        run: |
          set -euo pipefail
          test -n "$SITE_URL"
          test -n "$CRON_SECRET"

      - name: Trigger process-paddle-webhooks
        if: ${{ github.event.schedule == '0 5 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-paddle-webhooks')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/process-paddle-webhooks"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/process-paddle-webhooks"
          echo

      - name: Trigger process-scans
        if: ${{ github.event.schedule == '0 6 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-scans')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/process-scans"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/process-scans"
          echo

      - name: Trigger process-uptime
        if: ${{ github.event.schedule == '0 7 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-uptime')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/process-uptime"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/process-uptime"
          echo

      - name: Trigger sync-uptimerobot
        if: ${{ github.event.schedule == '0 8 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'sync-uptimerobot')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/sync-uptimerobot"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/sync-uptimerobot"
          echo

      - name: Trigger process-competitors
        if: ${{ github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-competitors')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/process-competitors"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/process-competitors"
          echo

      - name: Trigger process-reports
        if: ${{ github.event.schedule == '0 10 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-reports')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/process-reports"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/process-reports"
          echo

      - name: Trigger expire-trials
        if: ${{ github.event.schedule == '0 11 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'expire-trials')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/expire-trials"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/expire-trials"
          echo

      - name: Trigger process-lifecycle-emails
        if: ${{ github.event.schedule == '0 12 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-lifecycle-emails')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"
          echo "Triggering /api/cron/process-lifecycle-emails"
          curl --fail --show-error --silent \
            --location \
            --location-trusted \
            --request GET \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/process-lifecycle-emails"
          echo

      - name: Drain queued slow jobs
        if: ${{ github.event.schedule == '0 6 * * *' || github.event.schedule == '0 7 * * *' || github.event.schedule == '0 10 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'process-scans' || github.event.inputs.job == 'process-uptime' || github.event.inputs.job == 'process-reports')) }}
        run: |
          set -euo pipefail
          base_url="${SITE_URL%/}"

          for iteration in $(seq 1 20); do
            echo "Processing worker queue batch ${iteration}"
            response_file="$(mktemp)"
            headers_file="$(mktemp)"
            curl --fail --show-error --silent \
              --location \
              --location-trusted \
              --request GET \
              --header "Accept: application/json" \
              --header "Authorization: Bearer ${CRON_SECRET}" \
              --dump-header "$headers_file" \
              --output "$response_file" \
              "${base_url}/api/worker/process-queue"

            response="$(cat "$response_file")"
            echo "$response"

            if ! printf '%s' "$response" | node -e "const fs = require('fs'); const raw = fs.readFileSync(0, 'utf8').trim(); if (!raw.startsWith('{')) process.exit(1); JSON.parse(raw);" >/dev/null 2>&1; then
              echo "Worker response was not valid JSON." >&2
              echo "Response headers:" >&2
              cat "$headers_file" >&2
              rm -f "$response_file" "$headers_file"
              exit 1
            fi

            has_more="$(printf '%s' "$response" | node -e "const fs = require('fs'); const payload = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(String(Boolean(payload?.data?.hasMore)));" )"
            rm -f "$response_file" "$headers_file"

            if [ "$has_more" != "true" ]; then
              exit 0
            fi
          done

          echo "Worker queue still has pending jobs after 20 batches." >&2
          exit 1
